<text x="44" y="340" font-family="'JetBrains Mono',monospace" font-size="15.5" line-spacing="1.7">
  <tspan fill="#56d364" font-weight="700">Hello, World!</tspan><tspan fill="#ffffff" fill-opacity="0.92"> Senior Product Designer with 25+ years of experience,</tspan>
</text>
