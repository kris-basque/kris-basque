<svg width="820" height="320" viewBox="0 0 820 320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#620a72"/>
      <stop offset="50%" stop-color="#3c1580"/>
      <stop offset="100%" stop-color="#1818b3"/>
    </linearGradient>
    <pattern id="linesPattern" width="3" height="3" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="3" y2="0" stroke="#ffffff" stroke-width="1" stroke-opacity="0.1"/>
    </pattern>
    <style>
      .hello    { animation: fadeUp 0.6s ease 0.1s both; }
    .name1    { animation: fadeUp 0.6s ease 0.4s both; }
      .name2    { animation: fadeUp 0.6s ease 0.7s both; }
      .sub      { animation: fadeUp 0.5s ease 1.0s both; }
      .divider  { animation: fadeUp 0.5s ease 1.1s both; }
      .desc1    { animation: fadeUp 0.5s ease 1.3s both; }
      .desc2    { animation: fadeUp 0.5s ease 1.5s both; }
      .desc3    { animation: fadeUp 0.5s ease 1.6s both; }
      .logged   { animation: fadeUp 0.5s ease 1.8s both; }
      .path     { animation: fadeUp 0.5s ease 2.0s both; }
      .cursor   { animation: blink 1s step-end infinite; }
      .border   { animation: glow 2.5s ease-in-out infinite; }
      .icon     { animation: fadeUp 0.8s ease 0.5s both; }

      @keyframes fadeUp {
        from { opacity: 0; transform: translateY(8px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      @keyframes blink {
        0%, 100% { opacity: 1; }
        50%       { opacity: 0; }
      }
      @keyframes glow {
        0%, 100% { opacity: 0.35; }
        50%       { opacity: 0.9; }
      }
    </style>
  </defs>

  <!-- Background -->
  <rect width="820" height="320" rx="14" fill="url(#bgGradient)"/>
  <rect width="820" height="320" rx="14" fill="url(#linesPattern)"/>

  <!-- Animated border glow -->
  <rect class="border" x="1.5" y="1.5" width="817" height="317" rx="13" fill="none" stroke="#f472b6" stroke-width="1.5"/>

  <!-- Corner brackets — cyan -->
  <path d="M28 14 L14 14 L14 28" stroke="#38bdf8" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M792 14 L806 14 L806 28" stroke="#38bdf8" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M28 306 L14 306 L14 292" stroke="#38bdf8" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M792 306 L806 306 L806 292" stroke="#38bdf8" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Welcome to GitHub -->
  <text class="hello" x="35" y="50" font-family="Courier New, monospace" font-size="14" fill="#34d399" letter-spacing="1">Welcome to GitHub 👾</text>

  <!-- KRIS — pink -->
  <text class="name1" x="35" y="118" font-family="Courier New, monospace" font-size="64" font-weight="bold" fill="#38bdf8" letter-spacing="14">KRIS</text>

  <!-- BASQUE — light blue -->
  <text class="name2" x="35" y="170" font-family="Courier New, monospace" font-size="64" font-weight="bold" fill="#38bdf8" letter-spacing="9">BASQUE</text>

  <!-- Subtitle -->
  <text class="sub" x="36" y="210" font-family="Courier New, monospace" font-size="13" font-weight="bold" fill="#8b7ec8" letter-spacing="1">Head of Design · Product Engineer · UX · Java · Kotlin</text>

  <!-- Divider -->
  <line class="divider" x1="35" y1="224" x2="600" y2="224" stroke="#2a2560" stroke-width="1"/>

  <!-- Description -->
  <text class="desc1" x="35" y="244" font-family="Courier New, monospace" font-size="13" fill="#ede9ff"><tspan fill="#34d399" font-weight="bold">Hello, World!</tspan> Senior Product Designer crossing the line into</text>
  <text class="desc2" x="35" y="261" font-family="Courier New, monospace" font-size="13" fill="#ede9ff">engineering, going deeper into Java &amp; Kotlin.</text>

  <!-- Logged in -->
  <circle class="logged" cx="36" cy="280" r="5" fill="#f472b6"/>
  <text class="logged" x="48" y="284" font-family="Courier New, monospace" font-size="13" fill="#ede9ff">Logged in as user: <tspan fill="#f472b6" font-weight="bold">krisbasque</tspan></text>

  <!-- Path + blinking cursor -->
  <text class="path" x="35" y="304" font-family="Courier New, monospace" font-size="13" fill="#ede9ff">~/KrisBasqueRepo <tspan fill="#a78bfa">[∠main]</tspan>  <tspan class="cursor" fill="#f472b6">█</tspan></text>

  <!-- Custom logo — light blue, right side -->
  <svg x="660" y="55" width="92" height="120" viewBox="0 0 77 100">
    <path d="M75.9539 92.3414L52.951 51.3342C52.8943 51.2472 52.8189 51.1737 52.7302 51.1193C52.6416 51.0648 52.5419 51.0307 52.4384 51.0193C52.3349 51.008 52.2302 51.0197 52.1318 51.0536C52.0334 51.0876 51.9438 51.1428 51.8694 51.2155L38.1029 63.8468L72.1619 7.7018C72.6294 6.93434 72.884 6.05682 72.8998 5.15901C72.9157 4.2612 72.6922 3.37531 72.2521 2.59192C71.812 1.80853 71.1713 1.15575 70.3953 0.700357C69.6193 0.244961 68.736 0.00329441 67.8356 4.74422e-05H32.7167C30.7597 -0.00560614 28.8346 0.494124 27.1288 1.4506C25.423 2.40708 23.9945 3.78772 22.9824 5.45814L1.86995 40.2778C0.657718 42.2789 0.0115803 44.5701 0.000154214 46.9081C-0.0112719 49.246 0.612443 51.5435 1.80506 53.5563L26.3222 97.3249C26.8063 98.1395 27.4947 98.8145 28.3196 99.2836C29.1445 99.7526 30.0775 99.9995 31.0271 100H71.5844C72.4819 99.9998 73.3634 99.7626 74.1392 99.3125C74.915 98.8624 75.5576 98.2156 76.0014 97.4376C76.4453 96.6596 76.6748 95.7782 76.6664 94.8831C76.6581 93.988 76.4122 93.1111 75.9539 92.3414Z" fill="#ffffff"/>
  </svg>
</svg>
