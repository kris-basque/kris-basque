<text x="44" y="64" font-family="'JetBrains Mono',monospace" font-size="18" font-weight="700" fill="#56d364" letter-spacing="0.5">Welcome to GitHub 👾</text>

<!-- KRIS — Courier Prime 96px, gradient -->
<text x="44" y="178" font-family="'Courier Prime','Courier New',monospace" font-size="96" font-weight="700" fill="url(#nameGrad)" letter-spacing="1">KRIS</text>
<!-- BASQUE -->
<text x="44" y="266" font-family="'Courier Prime','Courier New',monospace" font-size="96" font-weight="700" fill="url(#nameGrad)" letter-spacing="1">BASQUE</text>

