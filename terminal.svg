<!-- ── CORNER BRACKETS — #79c0ff, 26×26px ────────────── -->
<path d="M70,16 L16,16 L16,70"   fill="none" stroke="#79c0ff" stroke-width="2" stroke-linecap="round"/>
<path d="M1210,16 L1264,16 L1264,70"  fill="none" stroke="#79c0ff" stroke-width="2" stroke-linecap="round"/>
