<svg width="1280" height="490" viewBox="0 0 1280 490" xmlns="http://www.w3.org/2000/svg">
<defs>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&amp;family=JetBrains+Mono:wght@400;700&amp;display=swap');
    @keyframes blink { 0%,49%{opacity:1} 50%,100%{opacity:0} }
  </style>

  <!-- Background: deep purple #3a1284 diagonal -->
  <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
    <stop offset="0%"   stop-color="#4a1a9e"/>
    <stop offset="50%"  stop-color="#3a1284"/>
    <stop offset="100%" stop-color="#1a0a50"/>
  </linearGradient>

  <!-- Name gradient: 115deg #5b8cff → #b14bd8 → #ff3d6e -->
  <linearGradient id="nameGrad" x1="44" y1="100" x2="900" y2="290" gradientUnits="userSpaceOnUse">
    <stop offset="0%"   stop-color="#5b8cff"/>
    <stop offset="48%"  stop-color="#b14bd8"/>
    <stop offset="100%" stop-color="#ff3d6e"/>
  </linearGradient>

  <!-- Scanlines -->
  <pattern id="scanlines" x="0" y="0" width="1280" height="3" patternUnits="userSpaceOnUse">
    <rect y="0" width="1280" height="1" fill="#ffffff" opacity="0.07"/>
  </pattern>
</defs>

<!-- ── BACKGROUND ──────────────────────────────────── -->
<rect width="1280" height="490" fill="url(#bgGrad)"/>

<!-- Topographic contour lines — upper-left hill -->
<ellipse cx="215" cy="200" rx="260" ry="180" fill="none" stroke="#7733bb" stroke-width="1.1" opacity="0.40"/>
<ellipse cx="222" cy="193" rx="210" ry="144" fill="none" stroke="#7733bb" stroke-width="1.1" opacity="0.36"/>
<ellipse cx="229" cy="186" rx="160" ry="108" fill="none" stroke="#7733bb" stroke-width="1.1" opacity="0.32"/>
<ellipse cx="236" cy="179" rx="110" ry="74"  fill="none" stroke="#7733bb" stroke-width="1.1" opacity="0.28"/>
<ellipse cx="243" cy="172" rx="62"  ry="42"  fill="none" stroke="#7733bb" stroke-width="1.1" opacity="0.24"/>

<!-- Upper-right hill (behind logo) -->
<ellipse cx="1020" cy="140" rx="310" ry="200" fill="none" stroke="#7733bb" stroke-width="1.1" opacity="0.36"/>
<ellipse cx="1014" cy="147" rx="252" ry="162" fill="none" stroke="#7733bb" stroke-width="1.1" opacity="0.32"/>
<ellipse cx="1008" cy="154" rx="195" ry="124" fill="none" stroke="#7733bb" stroke-width="1.1" opacity="0.28"/>
<ellipse cx="1002" cy="161" rx="138" ry="88"  fill="none" stroke="#7733bb" stroke-width="1.1" opacity="0.24"/>
<ellipse cx="996"  cy="168" rx="82"  ry="54"  fill="none" stroke="#7733bb" stroke-width="1.1" opacity="0.20"/>

<!-- Lower blob -->
<ellipse cx="600" cy="482" rx="400" ry="68" fill="none" stroke="#7733bb" stroke-width="1.1" opacity="0.30"/>
<ellipse cx="606" cy="484" rx="310" ry="46" fill="none" stroke="#7733bb" stroke-width="1.1" opacity="0.25"/>
<ellipse cx="612" cy="486" rx="220" ry="28" fill="none" stroke="#7733bb" stroke-width="1.1" opacity="0.20"/>

<!-- Connecting curves -->
<path d="M 0,305 C 190,285 410,318 650,298 C 890,278 1090,312 1280,293" fill="none" stroke="#7733bb" stroke-width="0.9" opacity="0.20"/>
<path d="M 0,112 C 270,96  510,128 740,110 C 970,93  1150,124 1280,106" fill="none" stroke="#7733bb" stroke-width="0.9" opacity="0.18"/>

<!-- Dark overlay: rgba(8,10,18,0.66) -->
<rect width="1280" height="490" fill="#080a12" opacity="0.66"/>

<!-- Scan lines -->
<rect width="1280" height="490" fill="url(#scanlines)"/>

<!-- Card border: rgba(255,255,255,0.16) -->
<rect x="0.5" y="0.5" width="1279" height="489" fill="none" stroke="#ffffff" stroke-opacity="0.16" stroke-width="1"/>

