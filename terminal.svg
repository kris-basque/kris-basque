<svg width="1270" height="490" viewBox="0 0 1270 490" xmlns="http://www.w3.org/2000/svg">
<defs>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700;800&amp;family=JetBrains+Mono:wght@400;700&amp;display=swap');
  </style>

  <!-- Background gradient -->
  <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
    <stop offset="0%"   stop-color="#8800cc"/>
    <stop offset="40%"  stop-color="#5500aa"/>
    <stop offset="100%" stop-color="#1a00dd"/>
  </linearGradient>

  <!-- Name gradients -->
  <linearGradient id="krisGrad" x1="50" y1="0" x2="560" y2="0" gradientUnits="userSpaceOnUse">
    <stop offset="0%"   stop-color="#88bbff"/>
    <stop offset="100%" stop-color="#cc77ff"/>
  </linearGradient>
  <linearGradient id="basqueGrad" x1="50" y1="0" x2="860" y2="0" gradientUnits="userSpaceOnUse">
    <stop offset="0%"   stop-color="#aa44ee"/>
    <stop offset="100%" stop-color="#ee99ff"/>
  </linearGradient>

  <!-- Scan-line pattern -->
  <pattern id="scanlines" x="0" y="0" width="1270" height="3" patternUnits="userSpaceOnUse">
    <rect y="0" width="1270" height="1" fill="#000" opacity="0.07"/>
  </pattern>

  <!-- Logo fade: transparent on left, white on right -->
  <linearGradient id="logoFade" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%"  stop-color="#ffffff" stop-opacity="0"/>
    <stop offset="40%" stop-color="#ffffff" stop-opacity="0.9"/>
    <stop offset="100%" stop-color="#ffffff" stop-opacity="0.9"/>
  </linearGradient>
</defs>

<!-- ── BACKGROUND ──────────────────────────────────────── -->
<rect width="1270" height="490" fill="url(#bgGrad)"/>

<!-- Topographic contour lines — upper-left hill -->
<ellipse cx="210" cy="195" rx="255" ry="175" fill="none" stroke="#cc66ff" stroke-width="1.2" opacity="0.38"/>
<ellipse cx="216" cy="189" rx="205" ry="140" fill="none" stroke="#cc66ff" stroke-width="1.2" opacity="0.35"/>
<ellipse cx="222" cy="183" rx="156" ry="106" fill="none" stroke="#cc66ff" stroke-width="1.2" opacity="0.33"/>
<ellipse cx="228" cy="177" rx="108" ry="73"  fill="none" stroke="#cc66ff" stroke-width="1.2" opacity="0.30"/>
<ellipse cx="234" cy="171" rx="62"  ry="42"  fill="none" stroke="#cc66ff" stroke-width="1.2" opacity="0.27"/>

<!-- Topographic contour lines — upper-right hill (behind logo area) -->
<ellipse cx="970" cy="130" rx="310" ry="210" fill="none" stroke="#cc66ff" stroke-width="1.2" opacity="0.35"/>
<ellipse cx="965" cy="136" rx="252" ry="170" fill="none" stroke="#cc66ff" stroke-width="1.2" opacity="0.32"/>
<ellipse cx="960" cy="142" rx="194" ry="130" fill="none" stroke="#cc66ff" stroke-width="1.2" opacity="0.30"/>
<ellipse cx="955" cy="148" rx="136" ry="91"  fill="none" stroke="#cc66ff" stroke-width="1.2" opacity="0.27"/>
<ellipse cx="950" cy="154" rx="80"  ry="54"  fill="none" stroke="#cc66ff" stroke-width="1.2" opacity="0.24"/>

<!-- Lower blob -->
<ellipse cx="590" cy="480" rx="400" ry="70"  fill="none" stroke="#cc66ff" stroke-width="1.2" opacity="0.32"/>
<ellipse cx="595" cy="483" rx="310" ry="48"  fill="none" stroke="#cc66ff" stroke-width="1.2" opacity="0.28"/>
<ellipse cx="600" cy="485" rx="220" ry="30"  fill="none" stroke="#cc66ff" stroke-width="1.2" opacity="0.24"/>

<!-- Connecting curves -->
<path d="M 0,310 C 180,290 400,320 640,300 C 880,280 1080,312 1270,294" fill="none" stroke="#cc66ff" stroke-width="1" opacity="0.22"/>
<path d="M 0,110 C 260,95  500,125 730,108 C 960,91  1140,122 1270,104" fill="none" stroke="#cc66ff" stroke-width="1" opacity="0.20"/>

<!-- Dark overlay -->
<rect width="1270" height="490" fill="#080418" opacity="0.56"/>

<!-- Scan lines -->
<rect width="1270" height="490" fill="url(#scanlines)"/>

